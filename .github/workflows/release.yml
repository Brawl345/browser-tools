name: Release

on:
  push:
    branches: [master]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for git push + release creation
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binaries
        env:
          GOFLAGS: -trimpath
          LDFLAGS: -s -w -buildid=
        run: |
          set -euo pipefail

          build() {
            local os="$1"
            local arch="$2"
            local output="$3"

            echo "Building ${os}/${arch}..."
            GOOS="$os" GOARCH="$arch" go build -ldflags "$LDFLAGS" -o "$output" .
          }

          build darwin  amd64 browser-tools-darwin-amd64 &
          build darwin  arm64 browser-tools-darwin-arm64 &
          build windows amd64 browser-tools-windows-x64.exe &
          build linux   amd64 browser-tools-linux-x64 &
          build linux   arm64 browser-tools-linux-arm64 &

          wait

      - name: Package (macOS amd64)
        run: |
          mkdir -p pkg/scripts
          cp browser-tools-darwin-amd64 pkg/scripts/browser-tools
          cp SKILL.md REFERENCE.md pkg/
          cd pkg && zip -r ../browser-tools-darwin-amd64.zip . && cd ..
          rm -rf pkg

      - name: Package (macOS arm64)
        run: |
          mkdir -p pkg/scripts
          cp browser-tools-darwin-arm64 pkg/scripts/browser-tools
          cp SKILL.md REFERENCE.md pkg/
          cd pkg && zip -r ../browser-tools-darwin-arm64.zip . && cd ..
          rm -rf pkg

      - name: Package (Windows x64)
        run: |
          mkdir -p pkg/scripts
          cp browser-tools-windows-x64.exe pkg/scripts/browser-tools.exe
          sed 's|\./scripts/browser-tools\b|\./scripts/browser-tools.exe|g' SKILL.md     > pkg/SKILL.md
          sed 's|\./scripts/browser-tools\b|\./scripts/browser-tools.exe|g' REFERENCE.md > pkg/REFERENCE.md
          cd pkg && zip -r ../browser-tools-windows-x64.zip . && cd ..
          rm -rf pkg

      - name: Package (Linux x64)
        run: |
          mkdir -p pkg/scripts
          cp browser-tools-linux-x64 pkg/scripts/browser-tools
          cp SKILL.md REFERENCE.md pkg/
          cd pkg && zip -r ../browser-tools-linux-x64.zip . && cd ..
          rm -rf pkg

      - name: Package (Linux arm64)
        run: |
          mkdir -p pkg/scripts
          cp browser-tools-linux-arm64 pkg/scripts/browser-tools
          cp SKILL.md REFERENCE.md pkg/
          cd pkg && zip -r ../browser-tools-linux-arm64.zip . && cd ..
          rm -rf pkg

      - name: Update latest tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}"
          git tag -f latest
          git push origin latest --force

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_SHA: ${{ github.sha }}
        run: |
          gh release delete latest --yes || true
          gh release create latest \
            --title Latest \
            --notes "Latest build — commit ${GH_SHA}" \
            --latest \
            browser-tools-darwin-amd64.zip \
            browser-tools-darwin-arm64.zip \
            browser-tools-windows-x64.zip \
            browser-tools-linux-x64.zip \
            browser-tools-linux-arm64.zip
